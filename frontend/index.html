    <script>
      // CRITICAL: Polyfill for crypto.randomUUID for non-secure contexts (http/ip access)
      // Must run before any other modules load
      (function() {
        try {
          const polyfill = function() {
            return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, function(c) {
              const cryptoObj = (typeof window !== 'undefined' ? (window.crypto || window.msCrypto) : null) || (typeof self !== 'undefined' ? self.crypto : null);
              const randomByte = (cryptoObj && cryptoObj.getRandomValues) 
                ? cryptoObj.getRandomValues(new Uint8Array(1))[0] 
                : Math.floor(Math.random() * 256);
              return (c ^ randomByte & 15 >> c / 4).toString(16);
            });
          };

          // 1. Try to polyfill the prototype for wide coverage
          if (typeof Crypto !== 'undefined' && Crypto.prototype && !Crypto.prototype.randomUUID) {
            try {
              Object.defineProperty(Crypto.prototype, 'randomUUID', { value: polyfill, writable: true, configurable: true });
            } catch (e) {
              Crypto.prototype.randomUUID = polyfill;
            }
          }

          // 2. Polyfill specific global targets
          const targets = [
            typeof window !== 'undefined' ? window : null,
            typeof self !== 'undefined' ? self : null,
            typeof globalThis !== 'undefined' ? globalThis : null
          ].filter(Boolean);

          targets.forEach(target => {
            try {
              if (!target.crypto) {
                target.crypto = {};
              }
              if (!target.crypto.randomUUID) {
                try {
                  Object.defineProperty(target.crypto, 'randomUUID', { value: polyfill, writable: true, configurable: true });
                } catch (e) {
                  target.crypto.randomUUID = polyfill;
                }
              }
            } catch (e) {}
          });
          console.log('✅ crypto.randomUUID polyfilled (Prototype + Targets)');
        } catch (e) {
          console.error('Failed to polyfill crypto.randomUUID:', e);
        }
      })();
    </script>
